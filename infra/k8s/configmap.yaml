apiVersion: v1
kind: ConfigMap
metadata:
  name: ambar-config
  namespace: ambar
data:
  ENVIRONMENT: production
  PROJECT_NAME: Ambar
  FRONTEND_ORIGINS: https://ambar.example.com
  MINIO_ENDPOINT: minio.ambar.svc.cluster.local:9000
  MINIO_BUCKET: ambar-documents
  OPENSEARCH_URL: http://opensearch.ambar.svc.cluster.local:9200
  OPENSEARCH_INDEX: ambar-documents
  CACHE_DEFAULT_TTL_SECONDS: "300"
  DB_POOL_SIZE: "20"
  DB_MAX_OVERFLOW: "40"
  DB_POOL_RECYCLE_SECONDS: "1800"
