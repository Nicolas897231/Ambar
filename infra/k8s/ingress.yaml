apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ambar-ingress
  namespace: ambar
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "25m"
    nginx.ingress.kubernetes.io/limit-rps: "20"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - ambar.example.com
      secretName: ambar-tls
  rules:
    - host: ambar.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: ambar-api
                port:
                  number: 8000
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: ambar-api
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ambar-web
                port:
                  number: 3000
