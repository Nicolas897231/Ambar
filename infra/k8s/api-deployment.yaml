apiVersion: apps/v1
kind: Deployment
metadata:
  name: ambar-api
  namespace: ambar
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ambar-api
  template:
    metadata:
      labels:
        app: ambar-api
    spec:
      containers:
        - name: api
          image: ghcr.io/your-org/ambar-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: ambar-config
            - secretRef:
                name: ambar-secrets
          env:
            - name: CLUSTER_NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: ambar-api
  namespace: ambar
spec:
  selector:
    app: ambar-api
  ports:
    - name: http
      port: 8000
      targetPort: 8000
