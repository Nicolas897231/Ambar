services:
  api-migrate:
    build:
      context: ../../backend
    env_file:
      - ./.env.api
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  api:
    build:
      context: ../../backend
    restart: unless-stopped
    env_file:
      - ./.env.api
    ports:
      - "10.10.10.240:8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health/live"]
      interval: 15s
      timeout: 5s
      retries: 10
    depends_on:
      api-migrate:
        condition: service_completed_successfully

  gateway:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "10.10.10.240:80:80"
    volumes:
      - ./gateway.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy